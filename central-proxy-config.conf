# Central Nginx Configuration Template
# ---------------------------------
# This file contains the recommended settings for your central Nginx server
# to replace the Next.js middleware logic for this project.

# 1. Add these to your 'http' block (outside the 'server' block)
# -------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=measles_api_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=measles_auth_limit:10m rate=5r/m;

# 2. Add this to your 'server' block for the specific subdomain
# -------------------------------------------------------------
server {
    listen 80;
    server_name your-subdomain.domain.com; # <--- UPDATE THIS

    # Secure Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self';" always;

    # CORS Configuration
    set $cors_origin "";
    if ($http_origin ~* (https?://your-subdomain\.domain\.com)$) {
        set $cors_origin $http_origin;
    }

    location / {
        # CSRF Protection: Block non-GET requests with invalid Origin
        # This replaces the middleware CSRF logic
        if ($request_method ~* (POST|PUT|DELETE|PATCH)) {
            set $csrf_block 1;
        }
        if ($http_origin ~* (https?://your-subdomain\.domain\.com)$ ) {
            set $csrf_block 0;
        }
        if ($http_origin = "") {
            set $csrf_block 0; # Allow same-origin without header
        }
        if ($csrf_block) {
            return 403 "Forbidden: Invalid Origin (CSRF Protection)";
        }

        # Rate Limiting for API
        location /api/ {
            limit_req zone=measles_api_limit burst=10 nodelay;
            limit_req_status 429;
            
            # Special limit for Auth
            location /api/auth/ {
                limit_req zone=measles_auth_limit burst=5 nodelay;
                proxy_pass http://localhost:3000; # <--- UPDATE TO YOUR APP HOST:PORT
            }

            proxy_pass http://localhost:3000; # <--- UPDATE TO YOUR APP HOST:PORT
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Standard Proxying
        proxy_pass http://localhost:3000; # <--- UPDATE TO YOUR APP HOST:PORT
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
